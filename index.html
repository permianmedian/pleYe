<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>pleYe — what's on now</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --base:#12130f; --panel:#1b1d17; --panel-2:#23261e; --line:#34382c;
    --text:#e6e4d9; --muted:#8a8d7c; --live:#ff5c38; --sched:#7fb069; --r:10px;
    --pop:#f0b429;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--base);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}

  .bar{display:flex;align-items:center;gap:24px;padding:14px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;background:rgba(18,19,15,.92);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:11px}
  .mark{width:26px;height:26px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px}
  .mark i{background:var(--muted);border-radius:2px}
  .mark i:nth-child(1){background:var(--live)} .mark i:nth-child(4){background:var(--sched)}
  .brand b{font-family:"Archivo",sans-serif;font-weight:900;letter-spacing:.14em;font-size:17px}
  .brand span{color:var(--muted);font-size:11px;letter-spacing:.18em}
  .status-line{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.04em}
  .status-line b{color:var(--live);font-weight:700}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 22px;border-bottom:1px solid var(--line)}
  .tab{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:500;letter-spacing:.03em;transition:.12s}
  .tab:hover{color:var(--text);border-color:var(--muted)}
  .tab[data-active="true"]{background:var(--text);color:var(--base);border-color:var(--text);font-weight:600}
  .tab .ct{font-family:"JetBrains Mono",monospace;font-size:10px;opacity:.7;margin-left:5px}

  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 80px}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin:22px 0 12px}
  .eyebrow:first-child{margin-top:0}
  .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:14px;transition:.14s}
  .card:hover{border-color:var(--muted)}
  .card.live{border-color:color-mix(in srgb,var(--live) 45%,var(--line))}
  .card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .league{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.05em;white-space:nowrap;font-family:"JetBrains Mono",monospace}
  .card-status[data-s="in"]{color:var(--live)} .card-status[data-s="pre"]{color:var(--sched)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .card-status[data-s="in"] .dot{animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .team{display:flex;align-items:center;gap:10px}
  .team .who{display:flex;align-items:center;gap:9px;min-width:0}
  .logo{width:26px;height:26px;border-radius:6px;flex-shrink:0;object-fit:contain;background:var(--panel-2)}
  .ini{width:26px;height:26px;border-radius:6px;flex-shrink:0;display:grid;place-items:center;font-family:"Archivo",sans-serif;font-weight:700;font-size:11px;color:#12130f;background:var(--muted)}
  .nm{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .match-title{font-weight:600;font-size:14px;line-height:1.45;color:var(--text)}

  .watch{display:flex;flex-direction:column;gap:8px;padding-top:12px;border-top:1px solid var(--line)}
  .wlabel{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
  .wrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .wbtn{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--text);transition:.12s}
  .wbtn:hover{border-color:var(--text)}
  .wbtn.ghost{background:transparent;font-weight:500;color:var(--muted);pointer-events:none}
  .wbtn .arr{color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:11px}
  .pop-badge{font-size:10.5px;font-weight:600;font-family:"JetBrains Mono",monospace;color:var(--pop);letter-spacing:.04em}

  .empty{color:var(--muted);padding:50px 0;text-align:center}
  .banner{background:color-mix(in srgb,var(--live) 12%,var(--panel));border:1px solid color-mix(in srgb,var(--live) 40%,var(--line));border-radius:var(--r);padding:14px 16px;margin-bottom:20px;font-size:13.5px;color:var(--text)}
  .banner code{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .foot{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.6}

  /* ---- modal ---- */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(12,13,10,.88);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px}
  .overlay[hidden]{display:none!important}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:920px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);gap:12px;flex-shrink:0}
  .modal-title{font-family:"Archivo",sans-serif;font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modal-close{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:8px;width:32px;height:32px;font-size:16px;flex-shrink:0;display:grid;place-items:center;transition:.12s}
  .modal-close:hover{color:var(--text);border-color:var(--muted)}
  .stream-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--line);flex-shrink:0}
  .stab{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:500;font-family:"JetBrains Mono",monospace;transition:.12s}
  .stab:hover{color:var(--text);border-color:var(--muted)}
  .stab.active{background:var(--text);color:var(--base);border-color:var(--text);font-weight:600}
  .stab.hd{color:var(--sched);border-color:color-mix(in srgb,var(--sched) 40%,var(--line))}
  .stab.hd:hover{border-color:var(--sched)}
  .stab.hd.active{background:var(--sched);color:var(--base);border-color:var(--sched)}
  .stab-div{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);align-self:center;padding:0 6px;opacity:.5;user-select:none}
  .stream-frame{flex:1;min-height:0;background:#000;position:relative}
  .stream-frame iframe{width:100%;height:100%;border:none;min-height:430px;display:block}
  .stream-msg{padding:60px 40px;text-align:center;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:13px}

  @media(max-width:560px){
    .wrap{padding:20px 16px 60px}
    .status-line{display:none}
    .modal{max-height:96vh;border-radius:10px}
    .stream-frame iframe{min-height:260px}
  }
</style>
</head>
<body>

<header class="bar">
  <div class="brand">
    <div class="mark"><i></i><i></i><i></i><i></i></div>
    <div><b>pleYe</b><br><span>WHAT'S ON NOW</span></div>
  </div>
  <div class="status-line" id="statusline">loading…</div>
</header>

<nav class="tabs" id="tabs"></nav>
<main class="wrap" id="view"><p class="empty">Fetching today's fixtures…</p></main>

<div class="overlay" id="modal" hidden>
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="stream-tabs" id="stream-tabs"></div>
    <div class="stream-frame" id="stream-frame"></div>
  </div>
</div>

<script>
const API   = 'https://streamed.pk/api';
const BADGE = 'https://streamed.pk/api/images/badge';

let MATCHES = [], MATCH_MAP = {}, lastOk = 0, hadError = false, activeTab = 'live';
let currentStreams = [];

/* ---- fetch ------------------------------------------------------------ */
async function pull() {
  try {
    const [live, today] = await Promise.all([
      fetch(`${API}/matches/live`).then(r => r.ok ? r.json() : []),
      fetch(`${API}/matches/all-today`).then(r => r.ok ? r.json() : []),
    ]);

    const liveIds = new Set(live.map(m => m.id));
    const merged  = {};
    today.forEach(m => { merged[m.id] = { ...m, isLive: liveIds.has(m.id) }; });
    live.forEach(m  => { if (!merged[m.id]) merged[m.id] = { ...m, isLive: true }; });

    MATCHES   = Object.values(merged);
    MATCH_MAP = {};
    MATCHES.forEach(m => { MATCH_MAP[m.id] = m; });
    lastOk   = Date.now();
    hadError = false;
  } catch {
    hadError = true;
  }
  render();
}

/* ---- tabs ------------------------------------------------------------- */
function buildTabs() {
  const cats = [...new Set(MATCHES.map(m => m.category).filter(Boolean))].sort();
  const defs = [
    { id: 'live',    name: 'Live now', ct: MATCHES.filter(m => m.isLive).length },
    { id: 'popular', name: 'Popular',  ct: MATCHES.filter(m => m.popular).length },
    { id: 'all',     name: 'All today',ct: MATCHES.length },
    ...cats.map(c => ({ id: c, name: cap(c), ct: MATCHES.filter(m => m.category === c).length })),
  ];
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  defs.forEach(d => {
    const b = document.createElement('button');
    b.className       = 'tab';
    b.dataset.active  = activeTab === d.id;
    b.innerHTML       = `${esc(d.name)}<span class="ct">${d.ct}</span>`;
    b.onclick         = () => { activeTab = d.id; render(); };
    el.appendChild(b);
  });
}

/* ---- render ----------------------------------------------------------- */
function render() {
  buildTabs();

  const sl = document.getElementById('statusline');
  if (hadError) {
    sl.textContent = 'feed unreachable';
  } else {
    const ago = lastOk ? Math.round((Date.now() - lastOk) / 1000) : 0;
    const n   = MATCHES.filter(m => m.isLive).length;
    sl.innerHTML = `<b>${n} live</b> · updated ${ago}s ago · auto-refresh 30s`;
  }

  const view = document.getElementById('view');

  if (hadError) {
    view.innerHTML = `<div class="banner">Couldn't reach the fixtures feed.
      The streamed.pk API is public — if the browser is blocking the request,
      try serving this file through a local web server (<code>npx serve .</code>).</div>`;
    return;
  }

  let list = MATCHES.slice();
  if      (activeTab === 'live')    list = list.filter(m => m.isLive);
  else if (activeTab === 'popular') list = list.filter(m => m.popular);
  else if (activeTab !== 'all')     list = list.filter(m => m.category === activeTab);

  list.sort((a, b) => (b.isLive - a.isLive) || (a.date - b.date));

  if (!list.length) {
    view.innerHTML = `<p class="empty">${
      activeTab === 'live'
        ? 'Nothing live right now — check All Today or a sport tab.'
        : 'No fixtures found here.'
    }</p>`;
    appendFoot(view);
    return;
  }

  const liveRows  = list.filter(m =>  m.isLive);
  const schedRows = list.filter(m => !m.isLive);
  let html = '';
  if (liveRows.length)  html += `<p class="eyebrow">Live · ${liveRows.length}</p><div class="grid">${liveRows.map(card).join('')}</div>`;
  if (schedRows.length) html += `<p class="eyebrow">Upcoming · ${schedRows.length}</p><div class="grid">${schedRows.map(card).join('')}</div>`;

  view.innerHTML = html;
  appendFoot(view);

  view.querySelectorAll('img.logo').forEach(img => {
    img.onerror = () => {
      const s       = document.createElement('span');
      s.className   = 'ini';
      s.textContent = img.dataset.ini;
      img.replaceWith(s);
    };
  });
}

/* ---- card ------------------------------------------------------------- */
function fmtDate(ms) {
  try { return new Date(ms).toLocaleString([], { weekday: 'short', hour: 'numeric', minute: '2-digit' }); }
  catch { return ''; }
}

function teamRow(team) {
  if (!team) return '';
  const ini  = (team.name || '?').slice(0, 3).toUpperCase();
  const logo = team.badge
    ? `<img class="logo" src="${BADGE}/${encodeURIComponent(team.badge)}.webp" data-ini="${esc(ini)}" alt="">`
    : `<span class="ini">${esc(ini)}</span>`;
  return `<div class="team"><div class="who">${logo}<span class="nm">${esc(team.name || '')}</span></div></div>`;
}

function card(m) {
  const teamsHtml = m.teams
    ? `<div>${teamRow(m.teams.home)}<div style="height:8px"></div>${teamRow(m.teams.away)}</div>`
    : `<div class="match-title">${esc(m.title || '')}</div>`;

  const srcN      = (m.sources || []).length;
  const streamBtn = srcN
    ? `<button class="wbtn" data-match="${esc(m.id)}">Watch <span class="arr">▶</span></button>`
    : `<span class="wbtn ghost">No streams</span>`;
  const popBadge  = m.popular ? `<span class="pop-badge">★ Popular</span>` : '';

  return `<div class="card ${m.isLive ? 'live' : ''}">
  <div class="card-top">
    <span class="league">${esc(cap(m.category || 'sport'))}</span>
    <span class="card-status" data-s="${m.isLive ? 'in' : 'pre'}">${
      m.isLive ? '<span class="dot"></span>LIVE' : esc(fmtDate(m.date))
    }</span>
  </div>
  ${teamsHtml}
  <div class="watch">
    <span class="wlabel">Streams · ${srcN}</span>
    <div class="wrow">${streamBtn}${popBadge}</div>
  </div>
</div>`;
}

/* ---- streams modal ---------------------------------------------------- */
document.getElementById('view').addEventListener('click', e => {
  const btn = e.target.closest('[data-match]');
  if (btn) openStreams(btn.dataset.match);
});

document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal').addEventListener('click', e => {
  if (e.currentTarget === e.target) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function openStreams(id) {
  const m = MATCH_MAP[id];
  if (!m || !(m.sources || []).length) return;

  document.getElementById('modal-title').textContent = m.title || 'Streams';
  document.getElementById('stream-tabs').innerHTML   = '';
  document.getElementById('stream-frame').innerHTML  = '<div class="stream-msg">Fetching streams…</div>';
  document.getElementById('modal').hidden            = false;
  document.body.style.overflow                       = 'hidden';

  const results = await Promise.allSettled(
    m.sources.map(s =>
      fetch(`${API}/stream/${encodeURIComponent(s.source)}/${encodeURIComponent(s.id)}`)
        .then(r => r.ok ? r.json() : [])
        .then(arr => (arr || []).map(st => ({ ...st, _source: s.source })))
    )
  );

  // Sort HD first, then by stream number within each tier
  const allStreams = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value)
    .filter(s  => s.embedUrl)
    .sort((a, b) => (b.hd - a.hd) || (a.streamNo - b.streamNo));

  currentStreams = allStreams;

  if (!currentStreams.length) {
    document.getElementById('stream-frame').innerHTML = '<div class="stream-msg">No streams available right now.</div>';
    return;
  }

  const hdStreams = currentStreams.filter(s =>  s.hd);
  const sdStreams = currentStreams.filter(s => !s.hd);

  const tabsEl = document.getElementById('stream-tabs');
  tabsEl.innerHTML = '';

  const addTab = (s, i) => {
    const lang = s.language || cap(s._source);
    const num  = s.streamNo > 1 ? ` #${s.streamNo}` : '';
    const b    = document.createElement('button');
    b.className   = ['stab', s.hd ? 'hd' : '', i === 0 ? 'active' : ''].filter(Boolean).join(' ');
    b.textContent = `${lang}${num}`;
    b.onclick     = () => selectStream(i);
    tabsEl.appendChild(b);
  };

  hdStreams.forEach((s, i) => addTab(s, i));

  if (hdStreams.length && sdStreams.length) {
    const div = document.createElement('span');
    div.className   = 'stab-div';
    div.textContent = '· SD ·';
    tabsEl.appendChild(div);
  }

  sdStreams.forEach((s, i) => addTab(s, hdStreams.length + i));

  selectStream(0);
}

function selectStream(i) {
  document.querySelectorAll('.stab').forEach((b, j) => b.classList.toggle('active', j === i));
  const frame  = document.getElementById('stream-frame');
  const iframe = document.createElement('iframe');
  iframe.allowFullscreen = true;
  iframe.allow = 'autoplay; fullscreen; picture-in-picture';
  iframe.src   = currentStreams[i].embedUrl;
  frame.innerHTML = '';
  frame.appendChild(iframe);
}

function closeModal() {
  document.getElementById('modal').hidden            = true;
  document.getElementById('stream-frame').innerHTML  = '';
  document.body.style.overflow                       = '';
  currentStreams = [];
}

/* ---- helpers ---------------------------------------------------------- */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function appendFoot(view) {
  const f = document.createElement('p');
  f.className   = 'foot';
  f.textContent = 'Match data via streamed.pk API. Streams are embedded from third-party sources — pleYe does not host any video.';
  view.appendChild(f);
}

/* ---- go --------------------------------------------------------------- */
pull();
setInterval(pull, 30_000);
</script>
</body>
</html>
